<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>POS Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>

*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0a0a;--card:#141414;--card2:#1a1a1a;
  --green:#4caf50;--g2:rgba(76,175,80,.15);
  --red:#ef5350;--r2:rgba(239,83,80,.15);
  --orange:#ff9800;--o2:rgba(255,152,0,.15);
  --blue:#42a5f5;--b2:rgba(66,165,245,.15);
  --border:#222;--muted:#666;
}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:#fff;min-height:100vh;}

/* ═══ LOGIN ═══ */
#loginWrap{
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:20px;
}
.lbox{
  background:var(--card);border:1px solid var(--border);
  border-radius:14px;padding:32px 28px;width:100%;max-width:360px;
}
.l-ico{width:52px;height:52px;border-radius:14px;background:var(--green);
  display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
.l-t{font-size:20px;font-weight:800;text-align:center;margin-bottom:3px;}
.l-s{font-size:13px;color:var(--muted);text-align:center;margin-bottom:22px;}
.fi{margin-bottom:13px;}
.fi label{font-size:11px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;font-weight:700;display:block;margin-bottom:5px;}
.fi input{width:100%;background:#1e1e1e;border:1.5px solid #2a2a2a;border-radius:8px;
  color:#fff;font-family:'Barlow',sans-serif;font-size:15px;padding:11px 14px;outline:none;transition:border-color .2s;}
.fi input:focus{border-color:var(--green);}
.btn-p{width:100%;background:var(--green);border:none;border-radius:8px;color:#fff;
  font-family:'Barlow',sans-serif;font-size:14px;font-weight:800;letter-spacing:.8px;
  text-transform:uppercase;padding:13px;cursor:pointer;margin-top:4px;}
.l-err{color:var(--red);font-size:12px;text-align:center;margin-top:8px;display:none;}

/* ═══ APP LAYOUT ═══ */
#app{display:none;}

/* Sidebar — hidden on mobile */
#sidebar{
  display:flex;
  flex-direction:column;
  width:220px;background:var(--card);border-right:1px solid var(--border);
  position:fixed;left:0;top:0;bottom:0;z-index:30;
  transform:translateX(-100%);
  transition:transform .25s;
}
#sidebar.open{transform:translateX(0);}
.sb-hd{padding:18px 16px;border-bottom:1px solid var(--border);}
.sb-brand{font-size:15px;font-weight:800;color:var(--green);}
.sb-sub{font-size:11px;color:var(--muted);margin-top:2px;}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0;}
.sb-i{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;
  font-size:13px;font-weight:600;color:var(--muted);margin:2px 8px;border-radius:7px;transition:all .15s;}
.sb-i:hover{background:rgba(255,255,255,.04);color:#ccc;}
.sb-i.on{color:var(--green);background:var(--g2);}
.sb-ft{margin-top:auto;padding:14px 16px;border-top:1px solid var(--border);
  display:flex;align-items:center;gap:10px;}
.sb-av{width:30px;height:30px;border-radius:50%;background:#2a2a2a;
  display:flex;align-items:center;justify-content:center;
  font-weight:800;color:var(--green);font-size:13px;flex-shrink:0;}
.btn-out{background:none;border:none;color:var(--muted);cursor:pointer;margin-left:auto;}

/* Topbar — mobile only */
#topbar{
  background:var(--card);border-bottom:1px solid var(--border);
  padding:0 14px;height:52px;display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:30;
}
.tb-brand{font-size:15px;font-weight:800;color:var(--green);}
.tb-page{font-size:12px;color:var(--muted);}
.btn-ic{background:none;border:none;color:var(--muted);cursor:pointer;padding:6px;}

/* Main */
#main{padding:16px 14px 80px;background:var(--bg);color:#fff;}

/* Bottom nav — mobile only */
#bnav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--card);border-top:1px solid var(--border);
  display:flex;z-index:20;
}
.bn{flex:1;display:flex;flex-direction:column;align-items:center;
  padding:10px 4px 8px;cursor:pointer;font-size:10px;font-weight:700;
  color:var(--muted);letter-spacing:.3px;gap:3px;text-transform:uppercase;}
.bn.on{color:var(--green);}

/* ═══ DESKTOP (≥900px) ═══ */
@media(min-width:900px){
  #sidebar{transform:translateX(0) !important;}
  #topbar{display:none;}
  #bnav{display:none;}
  #main{margin-left:220px;padding:28px;max-width:none;}
  #content{margin-left:220px;padding:28px;padding-bottom:40px;}
  #sbOv{display:none !important;}
}

/* ═══ TABLET (640-899px) ═══ */
@media(min-width:640px) and (max-width:899px){
  #main{padding:20px;max-width:none;}
}

/* ═══ PAGES ═══ */
.page{display:none;}.page.on{display:block;}
.ph{display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.ph-t{font-size:20px;font-weight:800;}
.ph-s{font-size:13px;color:var(--muted);margin-top:2px;}

/* ═══ KPI ═══ */
.kg{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px;}
.kc{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:14px 16px;position:relative;overflow:hidden;}
.kc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--c,#333);}
.kc-l{font-size:10px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;font-weight:700;margin-bottom:6px;}
.kc-v{font-size:22px;font-weight:800;color:var(--c,#fff);}
.kc-s{font-size:11px;color:var(--muted);margin-top:3px;}
@media(min-width:640px){
  .kg.k4{grid-template-columns:repeat(4,1fr);}
  .kg.k3{grid-template-columns:repeat(3,1fr);}
}

/* ═══ SEARCH ═══ */
.sbar{display:flex;align-items:center;gap:10px;background:var(--card);
  border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:14px;}
.sbar input{flex:1;background:transparent;border:none;color:#fff;
  font-family:'Barlow',sans-serif;font-size:14px;outline:none;}
.sbar input::placeholder{color:#444;}

/* ═══ LICENSE CARDS ═══ */
.lcard{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:12px;}
.lcard-h{padding:14px 16px;display:flex;align-items:flex-start;gap:11px;}
.ldot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.ldot.on{background:var(--green);}
.ldot.off{background:#333;}
.lmain{flex:1;min-width:0;}
.lkey{font-size:15px;font-weight:800;letter-spacing:.5px;}
.lnom{font-size:13px;color:#aaa;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lemail{font-size:11px;color:var(--muted);margin-top:1px;}
.lmeta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;}
.tag-g{background:var(--g2);color:var(--green);}
.tag-b{background:var(--b2);color:var(--blue);}
.tag-o{background:var(--o2);color:var(--orange);}
.tag-r{background:var(--r2);color:var(--red);}
.tag-gr{background:#1e1e1e;color:var(--muted);}
.lacts{display:flex;border-top:1px solid var(--border);}
.la{flex:1;padding:11px 6px;background:none;border:none;font-family:'Barlow',sans-serif;
  font-size:12px;font-weight:700;cursor:pointer;letter-spacing:.3px;text-transform:uppercase;
  display:flex;align-items:center;justify-content:center;gap:5px;transition:background .15s;}
.la:not(:last-child){border-right:1px solid var(--border);}
.la.cp{color:#aaa;}.la.cp:active{background:#1e1e1e;}
.la.ed{color:var(--blue);}.la.ed:active{background:var(--b2);}
.la.su{color:var(--red);}.la.su:active{background:var(--r2);}
.la.ac{color:var(--green);}.la.ac:active{background:var(--g2);}

/* ═══ LIST ITEMS ═══ */
.li{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:13px 16px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.li-ic{width:36px;height:36px;border-radius:9px;background:#1e1e1e;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--muted);}
.li-inf{flex:1;min-width:0;}
.li-t{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.li-s{font-size:12px;color:var(--muted);margin-top:2px;}
.li-r{text-align:right;flex-shrink:0;}
.li-v{font-size:15px;font-weight:700;}
.li-s2{font-size:11px;color:var(--muted);margin-top:2px;}

/* ═══ CHARTS ═══ */
.ccard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px;}
.cc-t{font-size:13px;font-weight:700;color:#ccc;margin-bottom:3px;}
.cc-s{font-size:11px;color:var(--muted);margin-bottom:14px;}
.cc-w{position:relative;height:200px;}
.cc-leg{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;}
.cc-li{display:flex;align-items:center;gap:6px;font-size:12px;color:#aaa;}
.cc-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.sec-t{font-size:11px;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;
  font-weight:700;margin:18px 0 10px;}

/* ═══ MISC ═══ */
.empty{text-align:center;padding:44px 16px;}
.empty-i{font-size:34px;margin-bottom:10px;}
.empty-t{font-size:15px;font-weight:700;color:#ccc;margin-bottom:6px;}
.empty-s{font-size:13px;color:var(--muted);}
.sp{display:inline-block;width:16px;height:16px;border:2px solid #333;
  border-top-color:var(--green);border-radius:50%;animation:sp .8s linear infinite;
  vertical-align:middle;margin-right:6px;}
@keyframes sp{to{transform:rotate(360deg);}}
.loading{text-align:center;padding:32px;color:var(--muted);font-size:14px;}
.btn-nueva{background:var(--green);border:none;border-radius:8px;color:#fff;
  font-family:'Barlow',sans-serif;font-size:13px;font-weight:800;
  padding:10px 16px;cursor:pointer;letter-spacing:.3px;}
.btn-nueva:active{background:#43a047;}
.lcount{font-size:13px;color:var(--muted);margin-top:2px;}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(16px);
  background:#2a2a2a;color:#fff;padding:10px 20px;border-radius:10px;
  font-size:13px;font-weight:600;opacity:0;transition:all .3s;z-index:9999;white-space:nowrap;}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
@media(min-width:900px){.toast{bottom:24px;}}

</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginWrap" style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;">
  <div style="background:var(--card);border:1px solid var(--border);border-radius:14px;padding:32px 28px;width:100%;max-width:360px;">
    <div style="font-size:24px;font-weight:800;color:var(--green);margin-bottom:4px;">⚡ POS Admin</div>
    <div style="font-size:13px;color:var(--muted);margin-bottom:24px;">Panel de Super Administrador</div>
    <div style="margin-bottom:12px;">
      <label style="font-size:11px;color:var(--muted);font-weight:700;display:block;margin-bottom:5px;">USUARIO</label>
      <input id="loginUser" type="text" value="admin" style="width:100%;background:#1e1e1e;border:1.5px solid #2a2a2a;border-radius:8px;color:#fff;font-family:inherit;font-size:15px;padding:11px 14px;outline:none;box-sizing:border-box;">
    </div>
    <div style="margin-bottom:16px;">
      <label style="font-size:11px;color:var(--muted);font-weight:700;display:block;margin-bottom:5px;">CONTRASEÑA</label>
      <input id="loginPass" type="password" style="width:100%;background:#1e1e1e;border:1.5px solid #2a2a2a;border-radius:8px;color:#fff;font-family:inherit;font-size:15px;padding:11px 14px;outline:none;box-sizing:border-box;" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button onclick="doLogin()" style="width:100%;background:var(--green);border:none;border-radius:8px;color:#fff;font-family:inherit;font-size:14px;font-weight:800;padding:13px;cursor:pointer;letter-spacing:.5px;">INGRESAR</button>
    <div id="loginErr" style="display:none;color:var(--red);font-size:12px;text-align:center;margin-top:8px;"></div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none;">

  <!-- Sidebar -->
  <div id="sidebar">
    <div class="sb-hd">
      <div style="font-size:14px;font-weight:800;color:var(--green);">⚡ POS Admin</div>
      <div style="font-size:11px;color:var(--muted);">Super Administrador</div>
    </div>
    <div class="sb-nav">
      <div class="sb-i on" onclick="goTo('lic')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>Licencias</div>
      <div class="sb-i" onclick="goTo('cli')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Clientes</div>
      <div class="sb-i" onclick="goTo('ter')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>Terminales</div>
      <div class="sb-i" onclick="goTo('rep')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Reportes</div>
      <div class="sb-i" onclick="goTo('ruc')">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>Contribuyentes</div>
    </div>
    <div class="sb-ft">
      <div style="width:30px;height:30px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;">A</div>
      <div style="flex:1;font-size:12px;color:#aaa;">admin</div>
      <button onclick="logout()" style="background:none;border:none;color:var(--muted);cursor:pointer;" title="Cerrar sesión">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>

  <!-- Topbar mobile -->
  <div id="topbar">
    <div style="display:flex;align-items:center;gap:8px;">
      <button class="menu-btn" onclick="toggleSB()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <span style="font-size:15px;font-weight:800;color:var(--green);">⚡ POS Admin</span>
    </div>
    <span id="tbPage" style="font-size:12px;color:var(--muted);">Licencias</span>
  </div>

  <!-- Sidebar overlay -->
  <div id="sbOv" onclick="toggleSB()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:29;"></div>

  <!-- SINGLE CONTENT DIV -->
  <div id="content" style="padding:16px 14px 80px;min-height:calc(100vh - 52px);box-sizing:border-box;">
    <div class="loading"><span class="sp"></span>Cargando...</div>
  </div>

  <!-- Bottom nav -->
  <div id="bnav">
    <div class="bn on" onclick="goTo('lic')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><span>Licencias</span></div>
    <div class="bn" onclick="goTo('cli')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><span>Clientes</span></div>
    <div class="bn" onclick="goTo('ter')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg><span>Terminales</span></div>
    <div class="bn" onclick="goTo('rep')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg><span>Reportes</span></div>
    <div class="bn" onclick="goTo('ruc')">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg><span>RUC</span></div>
  </div>

</div><!-- /#app -->

<!-- ══ MODAL — completamente fuera del app ══ -->
<div id="mOv" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9000;align-items:flex-end;justify-content:center;padding:0;" onclick="if(event.target===this)closeM()">
  <div style="background:#1a1a1a;border-radius:18px 18px 0 0;width:100%;max-width:520px;padding:20px 18px 40px;max-height:92vh;overflow-y:auto;">
    <div style="width:36px;height:4px;background:#333;border-radius:2px;margin:0 auto 16px;"></div>
    <div style="font-size:18px;font-weight:800;margin-bottom:18px;" id="mTitle">Nueva licencia</div>

    <div style="margin-bottom:13px;">
      <label style="font-size:11px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;font-weight:700;display:block;margin-bottom:5px;">Clave de licencia</label>
      <div style="display:flex;gap:8px;">
        <input id="mClave" type="text" placeholder="PRO-2026-XXXX"
          style="flex:1;background:#111;border:1.5px solid #2a2a2a;border-radius:8px;color:#fff;font-family:'Barlow',sans-serif;font-size:14px;font-weight:700;letter-spacing:1px;padding:11px 14px;outline:none;text-transform:uppercase;"
          oninput="this.value=this.value.toUpperCase()">
        <button onclick="genClave()"
          style="background:var(--green);border:none;border-radius:8px;color:#fff;font-family:'Barlow',sans-serif;font-size:12px;font-weight:800;padding:0 14px;cursor:pointer;white-space:nowrap;">
          🎲 GENERAR
        </button>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:13px;">
      <div>
        <label style="font-size:11px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;font-weight:700;display:block;margin-bottom:5px;">Plan</label>
        <select id="mPlan" onchange="genClave()"
          style="width:100%;background:#111;border:1.5px solid #2a2a2a;border-radius:8px;color:#fff;font-family:'Barlow',sans-serif;font-size:14px;padding:11px 14px;outline:none;">
          <option value="1">Básico — 1 disp.</option>
          <option value="2" selected>Pro — 3 disp.</option>
          <option value="3">Completo</option>
        </select>
      </div>
      <div>
        <label style="font-size:11px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;font-weight:700;display:block;margin-bottom:5px;">Tipo de pago</label>
        <select id="mTipo"
          style="width:100%;background:#111;border:1.5px solid #2a2a2a;border-radius:8px;color:#fff;font-family:'Barlow',sans-serif;font-size:14px;padding:11px 14px;outline:none;">
          <option value="anual">🔁 Anual</option>
          <option value="mensual">📅 Mensual</option>
          <option value="unico">💰 Pago único</option>
          <option value="trial">🎁 Trial</option>
        </select>
      </div>
    </div>

// ── SUPABASE ─────────────────────────────────────────────
async function sg(t,q){
  try{
    const r=await fetch(SURL+'/rest/v1/'+t+(q?'?'+q:''),{
      headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Content-Type':'application/json','Accept':'application/json'}
    });
    if(!r.ok){ const e=await r.text(); throw new Error('HTTP '+r.status+': '+e.substring(0,80)); }
    const d=await r.json();
    return Array.isArray(d)?d:[];
  }catch(e){
    if(e.message.includes('Failed to fetch'))
      throw new Error('Sin conexion con Supabase. Verificá tu internet.');
    throw e;
  }
}
async function spost(t,b){
  const r=await fetch(SURL+'/rest/v1/'+t,{method:'POST',
    headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Content-Type':'application/json','Prefer':'return=representation'},
    body:JSON.stringify(b)});
  if(!r.ok)throw new Error(await r.text());
  return await r.json();
}
async function spatch(t,id,b){
  const r=await fetch(SURL+'/rest/v1/'+t+'?id=eq.'+id,{method:'PATCH',
    headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Content-Type':'application/json'},
    body:JSON.stringify(b)});
  if(!r.ok)throw new Error(await r.text());
}
async function srpc(fn,p){
  const r=await fetch(SURL+'/rest/v1/rpc/'+fn,{method:'POST',
    headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Content-Type':'application/json'},
    body:JSON.stringify(p)});
  if(!r.ok)throw new Error(await r.text());
  return await r.json();
}

async function eliminarTer(id, nombre, activa){

    ? confirm('¿Qué querés hacer con "'+nombre+'"?\n\n✓ Aceptar = DESACTIVAR (el historial se conserva, el dispositivo pierde acceso)\n✗ Cancelar = No hacer nada')

  try{

    const r = await fetch(SURL+'/rest/v1/activaciones?id=eq.'+id,{
      method:'PATCH',
      headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Content-Type':'application/json'},

function calcRep(lics,terms){
  const hoy=new Date();
  const fin=new Date(hoy.getFullYear(),hoy.getMonth()+1,0);
  const act=lics.filter(l=>l.activa).length;
  const sus=lics.filter(l=>!l.activa).length;
  const tot=lics.length;
  const vec=lics.filter(l=>{const v=new Date(l.fecha_vence);return l.activa&&v>=hoy&&v<=fin;}).length;

  document.getElementById('rA').textContent=act;
  document.getElementById('rT').textContent=(terms||[]).filter(t=>t.activa).length;
  document.getElementById('rV').textContent=vec;
  document.getElementById('rS').textContent=sus;

  let mrr=0,arr=0;
  lics.filter(l=>l.activa).forEach(l=>{
    const m=l.monto||0,tp=l.tipo_pago||'anual';
    if(tp==='mensual'){mrr+=m;}
    else if(tp==='anual'){mrr+=Math.round(m/12);arr+=m;}
  });
  document.getElementById('rMRR').textContent=gs(mrr);
  document.getElementById('rARR').textContent=gs(arr);
  document.getElementById('rCH').textContent=tot>0?Math.round((sus/tot)*100)+'%':'0%';

  // Últimos 8 meses
  const labels=[],meses=[];
  for(let i=7;i>=0;i--){
    const d=new Date(hoy.getFullYear(),hoy.getMonth()-i,1);
    const key=d.getFullYear()+'-'+pad(d.getMonth()+1);
    const mn=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][d.getMonth()]+' '+String(d.getFullYear()).slice(2);
    labels.push(mn);
    meses.push({key,d,nuevas:0,rec:0,unico:0,act:0,sus:0});
  }
  lics.forEach(l=>{
    if(!l.created_at)return;
    const d=new Date(l.created_at);
    const key=d.getFullYear()+'-'+pad(d.getMonth()+1);
    const m=meses.find(x=>x.key===key);
    if(!m)return;
    const tp=l.tipo_pago||'anual';
    if(tp==='unico')m.unico++;
    else if(tp!=='trial')m.nuevas++;
  });
  meses.forEach(m=>{
    const fin2=new Date(m.d.getFullYear(),m.d.getMonth()+1,0);
    m.act=lics.filter(l=>l.activa&&l.created_at&&new Date(l.created_at)<=fin2).length;
    m.sus=lics.filter(l=>!l.activa&&l.created_at&&new Date(l.created_at)<=fin2).length;
    m.rec=lics.filter(l=>l.activa&&(l.tipo_pago==='anual'||l.tipo_pago==='mensual')&&l.created_at&&new Date(l.created_at)<m.d).length;
  });

  const topts={responsive:true,maintainAspectRatio:false,
    plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a1a1a',borderColor:'#333',borderWidth:1,titleColor:'#fff',bodyColor:'#aaa'}},
    scales:{x:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#666',font:{size:11}}},
            y:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#666',font:{size:11}},beginAtZero:true}}};

  // Gráfico 1
  if(chI){chI.destroy();chI=null;}
  chI=new Chart(document.getElementById('cIngresos').getContext('2d'),{
    type:'bar',
    data:{labels,datasets:[
      {label:'Nuevas',data:meses.map(m=>m.nuevas),backgroundColor:'rgba(76,175,80,.8)',borderRadius:4,borderSkipped:false},
      {label:'Recurrentes',data:meses.map(m=>m.rec),backgroundColor:'rgba(66,165,245,.7)',borderRadius:4,borderSkipped:false},
      {label:'Único',data:meses.map(m=>m.unico),backgroundColor:'rgba(255,152,0,.7)',borderRadius:4,borderSkipped:false},
    ]},
    options:{...topts,scales:{...topts.scales,x:{...topts.scales.x,stacked:true},y:{...topts.scales.y,stacked:true}}}
  });

  // Gráfico 2
  if(chC){chC.destroy();chC=null;}
  chC=new Chart(document.getElementById('cChurn').getContext('2d'),{
    type:'bar',
    data:{labels,datasets:[
      {label:'Activas',data:meses.map(m=>m.act),backgroundColor:'rgba(76,175,80,.8)',borderRadius:4,yAxisID:'y'},
      {label:'Suspendidas',data:meses.map(m=>m.sus),backgroundColor:'rgba(239,83,80,.7)',borderRadius:4,yAxisID:'y'},
      {label:'Churn %',data:meses.map(m=>(m.act+m.sus)>0?Math.round(m.sus/(m.act+m.sus)*100):0),
        type:'line',borderColor:'#ff9800',backgroundColor:'rgba(255,152,0,.08)',
        borderWidth:2,pointBackgroundColor:'#ff9800',pointRadius:4,tension:.3,yAxisID:'y2',fill:true},
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#1a1a1a',borderColor:'#333',borderWidth:1,titleColor:'#fff',bodyColor:'#aaa'}},
      scales:{
        x:{grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#666',font:{size:11}}},
        y:{type:'linear',position:'left',grid:{color:'rgba(255,255,255,.05)'},ticks:{color:'#666',font:{size:11}},beginAtZero:true},
        y2:{type:'linear',position:'right',grid:{drawOnChartArea:false},ticks:{color:'#ff9800',font:{size:11},callback:v=>v+'%'},beginAtZero:true,max:100}
      }}
  });

  // Por tipo y rubro
  const pt={anual:0,mensual:0,unico:0,trial:0},mt={anual:0,mensual:0,unico:0};
  const pr={};
  lics.forEach(l=>{
    const t=l.tipo_pago||'anual';
    if(pt[t]!==undefined)pt[t]++;
    if(l.monto&&mt[t]!==undefined)mt[t]+=l.monto;
    const r=l.rubro||'general';
    if(!pr[r])pr[r]=0; pr[r]++;
  });
  document.getElementById('repExtra').innerHTML=
    '<div class="sec-t">Por tipo de pago</div>'+
    '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:4px;">'+
      `<div class="kc" style="--c:var(--green)"><div class="kc-l">Anual</div><div class="kc-v">${pt.anual}</div><div class="kc-s">${gs(mt.anual)}/año</div></div>`+
      `<div class="kc" style="--c:var(--blue)"><div class="kc-l">Mensual</div><div class="kc-v">${pt.mensual}</div><div class="kc-s">${gs(mt.mensual)}/mes</div></div>`+
      `<div class="kc" style="--c:var(--orange)"><div class="kc-l">Pago único</div><div class="kc-v">${pt.unico}</div><div class="kc-s">${gs(mt.unico)} total</div></div>`+
      `<div class="kc" style="--c:#555"><div class="kc-l">Trial</div><div class="kc-v">${pt.trial}</div><div class="kc-s">Sin cobro</div></div>`+
    '</div>'+
    '<div class="sec-t" style="margin-top:16px;">Por rubro</div>'+
    Object.entries(pr).sort((a,b)=>b[1]-a[1]).map(([r,c])=>`
      <div class="li"><div class="li-ic"><span style="font-size:16px">📦</span></div>
      <div class="li-inf"><div class="li-t">${RUBROS[r]||r}</div></div>
      <div class="li-r"><div class="li-v" style="color:var(--green)">${c}</div><div class="li-s2">licencias</div></div></div>`).join('');
}

// Manejar archivos seleccionados
async function handleRucFiles(files){
  if(!files||!files.length) return;
  const fileArr = Array.from(files);
  
  document.getElementById('rucProgress').style.display='block';
  document.getElementById('rucLog').style.display='block';
  const log = document.getElementById('rucLog');
  log.innerHTML = '';

  function addLog(msg, color='#aaa'){
    const line = document.createElement('div');
    line.style.color = color;
    line.textContent = new Date().toLocaleTimeString()+' '+msg;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
  }

  let totalLines = 0, totalInserted = 0, totalErrors = 0;

  for(let fi=0; fi<fileArr.length; fi++){
    const file = fileArr[fi];
    addLog('📄 Procesando: '+file.name, '#fff');

    try {
      const text = await file.text();
      const lines = text.split('\n').filter(l=>l.trim());
      addLog('  '+lines.length+' registros encontrados');

      // Procesar en lotes de 500
      const BATCH = 500;
      let inserted = 0;

      for(let i=0; i<lines.length; i+=BATCH){
        const batch = lines.slice(i, i+BATCH);
        const records = [];

        batch.forEach(line => {
          const parts = line.trim().split('|');
          if(parts.length >= 5 && parts[0]){
            records.push({
              ruc:          parts[0].trim(),
              razon_social: parts[1]?.trim()||'',
              dv:           parts[2]?.trim()||'',
              codigo:       parts[3]?.trim()||'',
              estado:       parts[4]?.trim()||'ACTIVO',
              updated_at:   new Date().toISOString()
            });
          }
        });

        if(!records.length) continue;

        // Upsert batch
        const r = await fetch(SURL+'/rest/v1/contribuyentes?on_conflict=ruc',{
          method:'POST',
          headers:{
            'apikey':SKEY,'Authorization':'Bearer '+SKEY,
            'Content-Type':'application/json',
            'Prefer':'resolution=merge-duplicates,return=minimal'
          },
          body: JSON.stringify(records)
        });

        if(r.ok){
          inserted += records.length;
          totalInserted += records.length;
        } else {
          const err = await r.text();
          totalErrors++;
          addLog('  ⚠️ Error lote '+(i/BATCH+1)+': '+err.substring(0,80), '#ef5350');
        }

        // Actualizar progreso
        const pct = Math.round(((fi*lines.length + i + BATCH) / (fileArr.length*lines.length)) * 100);
        const pctClamped = Math.min(pct, 100);
        document.getElementById('rucProgressBar').style.width = pctClamped+'%';
        document.getElementById('rucProgressPct').textContent = pctClamped+'%';
        document.getElementById('rucProgressLabel').textContent = 'Importando '+file.name+'...';
        document.getElementById('rucProgressDetail').textContent = 
          'Lote '+(Math.floor(i/BATCH)+1)+' de '+Math.ceil(lines.length/BATCH)+
          ' | '+inserted.toLocaleString()+' registros insertados';

        // Pequeña pausa para no sobrecargar
        await new Promise(r=>setTimeout(r,50));
      }

      totalLines += lines.length;
      addLog('  ✅ '+file.name+': '+inserted.toLocaleString()+' registros importados', '#4caf50');

    } catch(e){
      addLog('  ❌ Error leyendo '+file.name+': '+e.message, '#ef5350');
    }
  }

  // Resumen final
  document.getElementById('rucProgressBar').style.width = '100%';
  document.getElementById('rucProgressPct').textContent = '100%';
  document.getElementById('rucProgressLabel').textContent = '✅ Importación completa';
  document.getElementById('rucProgressDetail').textContent = 
    totalInserted.toLocaleString()+' registros importados · '+totalErrors+' errores';
  addLog('─────────────────────────────────', '#333');
  addLog('TOTAL: '+totalInserted.toLocaleString()+' registros | '+totalErrors+' errores', '#fff');

  // Recargar estadísticas
  await loadRuc();
  toast('✅ Importación finalizada: '+totalInserted.toLocaleString()+' registros');
}

let rucBuscarTimer = null;
async function buscarRucAdmin(q){
  clearTimeout(rucBuscarTimer);
  const el = document.getElementById('rucResultados');
  if(!q||q.length<2){ el.innerHTML=''; return; }
  rucBuscarTimer = setTimeout(async()=>{
    el.innerHTML='<div class="loading"><span class="sp"></span>Buscando...</div>';
    try {
      const qClean = q.replace(/[-\s\.]/g,'');
      // Buscar por RUC exacto o nombre
      const isNum = /^\d+$/.test(qClean);
      const query = isNum
        ? 'ruc=like.'+encodeURIComponent(qClean+'%')+'&limit=10'
        : 'razon_social=ilike.'+encodeURIComponent('%'+q+'%')+'&limit=10';
      const rows = await fetch(SURL+'/rest/v1/contribuyentes?'+query+'&select=ruc,razon_social,dv,estado',{
        headers:{'apikey':SKEY,'Authorization':'Bearer '+SKEY,'Accept':'application/json'}
      }).then(r=>r.json());

      if(!rows.length){ el.innerHTML='<div style="color:var(--muted);font-size:13px;padding:8px 0;">Sin resultados</div>'; return; }

      el.innerHTML = rows.map(r=>{
        const color = r.estado==='ACTIVO'?'var(--green)':r.estado==='CANCELADO'?'var(--red)':'var(--orange)';
        return '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);">'+
          '<div><div style="font-size:13px;font-weight:700;color:#fff;">'+r.razon_social+'</div>'+
          '<div style="font-size:12px;color:var(--muted);">RUC: '+r.ruc+(r.dv?'-'+r.dv:'')+'</div></div>'+
          '<span style="font-size:11px;background:rgba(0,0,0,.3);color:'+color+';padding:3px 8px;border-radius:10px;font-weight:700;">'+r.estado+'</span>'+
          '</div>';
      }).join('');
    } catch(e){ el.innerHTML='<div style="color:var(--red);font-size:13px;">Error: '+e.message+'</div>'; }
  }, 400);
}

async function renderRuc(){
  document.getElementById('content').innerHTML = `
    <div class="ph"><div><div class="pt">Contribuyentes RUC</div><div class="ps">Importar base de datos SET/DNIT</div></div></div>
    <div class="kg" style="grid-template-columns:repeat(3,1fr);margin-bottom:20px;">
      <div class="kc" style="--c:var(--green)"><div class="kc-l">Total registros</div><div class="kc-v" id="rucTotal">—</div><div class="kc-s">en base de datos</div></div>
      <div class="kc" style="--c:var(--blue)"><div class="kc-l">Activos</div><div class="kc-v" id="rucActivos">—</div></div>
      <div class="kc" style="--c:var(--muted)"><div class="kc-l">Última importación</div><div class="kc-v" id="rucUltima" style="font-size:14px;">—</div></div>
    </div>
    <div class="card" style="margin-bottom:20px;">
      <div class="card-h"><span class="card-t">📥 Importar archivos TXT del SET</span></div>
      <div style="padding:16px;">
        <div style="font-size:13px;color:var(--muted);margin-bottom:12px;line-height:1.6;">
          Seleccioná uno o varios archivos TXT del SET (ruc1.txt ... ruc9.txt).<br>
          Formato: <code style="background:#1e1e1e;padding:2px 6px;border-radius:4px;font-size:11px;">RUC|RAZON_SOCIAL|DV|CODIGO|ESTADO|</code>
        </div>
        <div id="rucDropZone" style="border:2px dashed #2a2a2a;border-radius:10px;padding:30px;text-align:center;cursor:pointer;margin-bottom:14px;">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.5" style="margin-bottom:8px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          <div style="font-size:14px;font-weight:700;color:#aaa;margin-bottom:4px;">Arrastrá los archivos acá</div>
          <div style="font-size:12px;color:#555;">o hacé click para seleccionar</div>
          <input type="file" id="rucFileInput" accept=".txt" multiple style="display:none">
        </div>
        <div id="rucProgress" style="display:none;">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
            <span style="font-size:13px;font-weight:700;" id="rucProgressLabel">Procesando...</span>
            <span style="font-size:12px;color:var(--muted);" id="rucProgressPct">0%</span>
          </div>
          <div style="background:#1e1e1e;border-radius:4px;height:8px;overflow:hidden;margin-bottom:8px;">
            <div id="rucProgressBar" style="height:100%;width:0%;background:var(--green);border-radius:4px;transition:width .3s;"></div>
          </div>
          <div style="font-size:12px;color:var(--muted);" id="rucProgressDetail"></div>
        </div>
        <div id="rucLog" style="display:none;background:#0a0a0a;border:1px solid #1e1e1e;border-radius:8px;padding:12px;font-family:monospace;font-size:11px;max-height:200px;overflow-y:auto;color:#aaa;"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-h"><span class="card-t">🔍 Consultar contribuyente</span></div>
      <div style="padding:16px;">
        <div style="display:flex;gap:8px;margin-bottom:12px;">
          <input id="rucBuscarInput" type="text" placeholder="Ingresá RUC o nombre..."
            style="flex:1;background:#1e1e1e;border:1.5px solid #2a2a2a;border-radius:8px;color:#fff;font-family:inherit;font-size:14px;padding:10px 14px;outline:none;">
        </div>
        <div id="rucResultados"></div>
      </div>
    </div>`;

  // Wire up events
  var dz = document.getElementById('rucDropZone');
  var fi = document.getElementById('rucFileInput');
  if(dz){
    dz.onclick = function(){ fi.click(); };
    dz.ondragover = function(e){ e.preventDefault(); dz.style.borderColor='var(--green)'; };
    dz.ondragleave = function(){ dz.style.borderColor='#2a2a2a'; };
    dz.ondrop = function(e){ e.preventDefault(); dz.style.borderColor='#2a2a2a'; handleRucFiles(e.dataTransfer.files); };
  }
  if(fi){ fi.onchange = function(){ handleRucFiles(fi.files); }; }

  var bi = document.getElementById('rucBuscarInput');
  if(bi){ bi.oninput = function(){ buscarRucAdmin(bi.value); }; }

  await loadRuc();
}


// Init
if(localStorage.getItem('sa')) goTo('lic');
</script>
