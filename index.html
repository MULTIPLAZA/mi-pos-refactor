<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <!-- ============================================================
    index.html — Pantalla del cajero (punto de venta)
    Ampersand POS
    ============================================================
    PROPÓSITO:
      Esta es la pantalla principal del sistema POS.
      Solo debe contener HTML (estructura) y estilos (CSS).
      Toda la lógica está en los archivos JS de la carpeta /js/.

    ARCHIVOS JS IMPORTADOS:
      - js/ui.js        → Utilidades de UI (toast, goTo, gs)
      - js/db.js        → Acceso a Firebase y Supabase
      - js/ventas.js    → Carrito, tickets, cálculos
      - js/articulos.js → Catálogo de productos
      - js/cobro.js     → Pantalla de cobro y confirmación
      - js/config.js    → Configuración del negocio

    PANTALLAS (screens):
      Cada "pantalla" es un <div class="screen"> con un ID único.
      Solo una pantalla es visible a la vez (la que tiene clase "active").
      Usá goTo('scNombre') para navegar entre ellas.

    PANTALLAS DISPONIBLES:
      #scLogin         → Login / selección de negocio
      #scSale          → Pantalla principal de ventas (cajero)
      #scGuardar       → Guardar ticket pendiente
      #scPendientes    → Lista de tickets pendientes
      #scCobrar        → Cobro al cliente
      #scDividir       → Pago dividido
      #scConfig        → Menú de configuración
      #scConfigGeneral → Configuración general del negocio
      #scDescuentos    → Gestión de descuentos
      #scArticulosList → Lista de artículos (admin)
      #scArticuloForm  → Formulario de artículo

    ESTRUCTURA GENERAL:
      <body>
        <div id="toast">              ← Notificaciones temporales
        <div id="npOverlay">          ← Teclado numérico (modal)
        <div id="catOv">             ← Bottom sheet de categorías
        <div class="screen" id="scSale">  ← Pantalla de ventas
        <div class="screen" id="scCobrar"> ← Pantalla de cobro
        ... más pantallas ...
  ============================================================ -->

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Ampersand POS</title>

  <!-- Manifiesto PWA: hace que la app se pueda instalar en el celular como app nativa -->
  <link rel="manifest" href="manifest.json" />

  <!-- Ícono de la app -->
  <link rel="icon" href="icon.png" />

  <!--
    ESTILOS CSS
    Idealmente el CSS debería estar en un archivo separado: css/styles.css
    Por ahora está inline para simplificar el despliegue.
    TODO: mover a /css/styles.css
  -->
  <style>
    /* ── VARIABLES DE TEMA ───────────────────────────────────────
       Usamos variables CSS para que el cambio de tema (claro/oscuro)
       solo requiera cambiar estas variables.
       Todos los colores del sistema deben usar estas variables,
       NO valores hardcodeados como #ffffff o #000000.
    ────────────────────────────────────────────────────────────── */
    :root[data-theme="dark"] {
      --bg: #121212;          /* Fondo principal */
      --surface: #1e1e1e;     /* Fondo de tarjetas y paneles */
      --surface2: #2a2a2a;    /* Fondo de elementos secundarios */
      --border: #333;         /* Color de bordes */
      --text: #f0f0f0;        /* Texto principal */
      --muted: #888;          /* Texto secundario (etiquetas, hints) */
      --accent: #4fc3f7;      /* Color de acento (botones, links) */
      --success: #66bb6a;     /* Color de éxito (verde) */
      --danger: #ef5350;      /* Color de error/peligro (rojo) */
      --warning: #ffa726;     /* Color de advertencia (naranja) */
    }

    :root[data-theme="light"] {
      --bg: #f5f5f5;
      --surface: #ffffff;
      --surface2: #eeeeee;
      --border: #ddd;
      --text: #1a1a1a;
      --muted: #666;
      --accent: #0288d1;
      --success: #388e3c;
      --danger: #c62828;
      --warning: #e65100;
    }

    /* ── RESET BÁSICO ────────────────────────────────────────────
       Quitamos los estilos por defecto del navegador para tener
       control total sobre la apariencia.
    ────────────────────────────────────────────────────────────── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;         /* dvh = dynamic viewport height, funciona bien en móvil */
      overflow: hidden;       /* Sin scroll en el body — cada pantalla maneja su propio scroll */
    }

    /* ── SISTEMA DE PANTALLAS ────────────────────────────────────
       Cada pantalla ocupa toda la ventana y se oculta/muestra
       cambiando la clase "active".
    ────────────────────────────────────────────────────────────── */
    .screen {
      position: absolute;
      inset: 0;               /* top:0, right:0, bottom:0, left:0 */
      display: none;          /* Oculta por defecto */
      flex-direction: column;
      overflow: hidden;
    }

    /* Solo la pantalla con "active" se muestra */
    .screen.active { display: flex; }

    /* ── TOAST (notificaciones) ───────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 80px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(0,0,0,0.85);
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;   /* No bloquea clics */
      z-index: 9999;
      white-space: nowrap;
    }

    /* Al agregar clase "show", el toast se hace visible */
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── TECLADO NUMÉRICO (NUMPAD) ───────────────────────────── */
    #npOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    #npOverlay.open {
      opacity: 1;
      pointer-events: all;
    }

    /* ── BOTTOM SHEET (selector de categorías/métodos) ────────── */
    #catOv {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 900;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    #catOv.open {
      opacity: 1;
      pointer-events: all;
    }

    /* ────────────────────────────────────────────────────────────
       TODO: El resto del CSS (botones, grilla de productos, etc.)
       debe seguir aquí. Cada sección debería tener un comentario
       explicando qué estiliza.
    ────────────────────────────────────────────────────────────── */
  </style>
</head>
<body>

  <!-- ============================================================
    ELEMENTOS GLOBALES
    Siempre presentes, no son pantallas sino overlays y modals.
  ============================================================ -->

  <!-- Toast: mensaje temporal (ej: "✓ Artículo guardado") -->
  <div id="toast"></div>

  <!-- Teclado numérico: se abre al tocar un campo de monto -->
  <div id="npOverlay">
    <div id="npPanel">
      <!-- Etiqueta del campo que se está editando -->
      <div id="npLbl" style="text-align:center;color:var(--muted);font-size:13px;padding:12px 0 4px;">Monto</div>

      <!-- Valor actual ingresado -->
      <div id="npDisp" style="text-align:center;font-size:32px;font-weight:700;padding:8px 0 16px;">₲0</div>

      <!-- Fila de billetes rápidos (solo para efectivo) -->
      <div id="billetesRow" class="billetes-row">
        <!-- Los botones de billetes se generan dinámicamente -->
      </div>

      <!-- Teclado numérico: 9 dígitos + backspace + 000 + confirmar -->
      <div class="numpad-grid">
        <button onclick="npKey('1')">1</button>
        <button onclick="npKey('2')">2</button>
        <button onclick="npKey('3')">3</button>
        <button onclick="npKey('4')">4</button>
        <button onclick="npKey('5')">5</button>
        <button onclick="npKey('6')">6</button>
        <button onclick="npKey('7')">7</button>
        <button onclick="npKey('8')">8</button>
        <button onclick="npKey('9')">9</button>
        <button onclick="npKey('⌫')" style="font-size:20px;">⌫</button>
        <button onclick="npKey('0')">0</button>
        <button onclick="npKey('000')" style="font-size:13px;">000</button>
        <!-- El botón de confirmar ocupa toda la última fila -->
        <button onclick="npKey('✓')" style="grid-column:1/-1;background:var(--accent);color:#fff;font-size:16px;font-weight:700;">
          ✓ CONFIRMAR
        </button>
      </div>
    </div>
  </div>

  <!-- Bottom sheet: selector de categorías o métodos de pago -->
  <div id="catOv" onclick="this.classList.remove('open')">
    <div id="catSheetContent" onclick="event.stopPropagation()">
      <!-- Las opciones se generan dinámicamente -->
    </div>
  </div>

  <!-- ============================================================
    PANTALLA: LOGIN / SELECCIÓN DE NEGOCIO
    ID: scSale no, este es scLogin
    La primera pantalla que ve el usuario.
  ============================================================ -->
  <div class="screen active" id="scLogin">
    <!-- Acá va el formulario de login -->
    <!-- Por ahora mostramos un placeholder -->
    <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;">
      <h1 style="font-size:28px;font-weight:700;">Ampersand POS</h1>
      <p style="color:var(--muted);">Sistema de Punto de Venta</p>
      <!-- TODO: agregar campos de email/password o selección de negocio -->
      <button onclick="goTo('scSale')" style="padding:12px 32px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:16px;cursor:pointer;">
        Ingresar
      </button>
    </div>
  </div>

  <!-- ============================================================
    PANTALLA: VENTAS (PRINCIPAL)
    ID: scSale
    Es la pantalla donde el cajero trabaja todo el tiempo.

    ESTRUCTURA:
      [Panel lateral] | [Grilla de productos]

    Panel lateral (tabBar):
      - Tipo de pedido (local / llevar / delivery)
      - Carrito de compras (lista de ítems)
      - Total y botones de acción
  ============================================================ -->
  <div class="screen" id="scSale">

    <!-- Barra superior con búsqueda y categorías -->
    <div id="topBar">
      <!-- Pastillas de categorías (se renderizan con renderCatPills) -->
      <div id="catPills"></div>

      <!-- Barra de búsqueda (se muestra al tocar el ícono de lupa) -->
      <div id="searchBar">
        <input id="searchInput" type="text" placeholder="Buscar artículos..."
          oninput="onSearch(this.value, curCat, addCart)" />
      </div>
    </div>

    <!-- Contenedor principal: panel lateral + grilla -->
    <div id="mainArea">

      <!-- ── PANEL LATERAL (CARRITO) ─────────────────────────── -->
      <div id="tabBar">

        <!-- Número de ticket actual -->
        <div id="tabTicketHeader">
          <span id="tabTicketNro">#0001</span>
          <button onclick="nuevaVenta(updUI, updBtnGuardar, updMesaBtn)">+ Nuevo</button>
        </div>

        <!-- Botones de tipo de pedido -->
        <div id="tabTipoBar">
          <button id="tipoBtnLocal"   onclick="setTipoPedido('local')">Local</button>
          <button id="tipoBtnLlevar"  onclick="setTipoPedido('llevar')" class="sel">Llevar</button>
          <button id="tipoBtnDelivery" onclick="setTipoPedido('delivery')">Delivery</button>
        </div>

        <!-- Barra de delivery (solo visible cuando tipo = delivery) -->
        <div id="tabDeliveryBar">
          <input id="tabDeliveryMonto" type="number" placeholder="Monto envío (₲)" />
          <button onclick="agregarMontoDelivery(updUI, updBtnGuardar)">+ Agregar</button>
        </div>

        <!-- Lista de ítems del carrito
             Se dibuja dinámicamente con la función renderTkt() -->
        <div id="tabTkt"></div>

        <!-- Footer del panel: totales y botones de acción -->
        <div id="tabFooter">

          <!-- Totales -->
          <div id="tabTotals">
            <div class="total-row">
              <span>Subtotal</span>
              <span id="tabSubtotal">₲0</span>
            </div>
            <!-- Esta fila solo aparece cuando hay descuento -->
            <div class="total-row" id="tabDescRow" style="display:none;">
              <span>Descuento</span>
              <span id="tabDesc" style="color:var(--danger);">−₲0</span>
            </div>
            <div class="total-row total-final">
              <span>TOTAL</span>
              <span id="tabTotal">₲0</span>
            </div>
          </div>

          <!-- Botones de acción -->
          <div id="tabActions">

            <!-- Botón GUARDAR / PENDIENTES (cambia según el estado) -->
            <button id="btnGuardar" onclick="onBtnGuardar(mesaActual, guardarConMesa, goGuardar, goPendientes)">
              <svg id="btnGuardarIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <!-- El SVG se actualiza dinámicamente por updBtnGuardar() -->
              </svg>
              <span id="btnGuardarTxt">GUARDAR</span>
              <!-- Badge con la cantidad de pendientes -->
              <span id="pendingBadge"></span>
            </button>

            <!-- Botón COBRAR (el principal, siempre visible) -->
            <button id="btnCobrar" onclick="goCobrar()">
              COBRAR
            </button>

          </div>
        </div>
      </div>
      <!-- fin #tabBar -->

      <!-- ── GRILLA DE PRODUCTOS ─────────────────────────────── -->
      <!--
        La grilla se llena dinámicamente con renderP().
        Cada producto es un botón generado por articulos.js.
      -->
      <div id="prodGrid"></div>

    </div>
    <!-- fin #mainArea -->
  </div>
  <!-- fin #scSale -->

  <!-- ============================================================
    PANTALLA: GUARDAR TICKET
    ID: scGuardar
    Se muestra cuando el cajero guarda un pedido para cobrar después.
    Permite agregar una observación (ej: "Mesa 5", "Cliente: Juan").
  ============================================================ -->
  <div class="screen" id="scGuardar">
    <div class="screen-header">
      <button onclick="goTo('scSale')">← Volver</button>
      <h2>Guardar ticket <span id="guardNro"></span></h2>
    </div>
    <div class="screen-body">

      <!-- Resumen de los ítems del ticket -->
      <div id="guardItemsList"></div>

      <!-- Observación opcional (ej: nombre del cliente, número de mesa) -->
      <label>Observación (opcional)</label>
      <input id="guardObs" type="text" placeholder="Ej: Mesa 5, Juan, para las 13hs..." />

      <!-- Botón de confirmar guardado -->
      <button onclick="doGuardar(updUI, updBtnGuardar)">
        ✓ GUARDAR TICKET
      </button>

    </div>
  </div>

  <!-- ============================================================
    PANTALLA: TICKETS PENDIENTES
    ID: scPendientes
    Lista de todos los tickets guardados sin cobrar.
    El cajero puede cargar uno para editarlo o cobrarlo.
  ============================================================ -->
  <div class="screen" id="scPendientes">
    <div class="screen-header">
      <button onclick="goTo('scSale')">← Volver</button>
      <h2>Tickets pendientes</h2>
    </div>
    <!-- La lista se llena dinámicamente con renderPendientes() -->
    <div id="pendList"></div>
  </div>

  <!-- ============================================================
    PANTALLA: COBRO
    ID: scCobrar
    Donde el cajero cobra al cliente.

    FLUJO:
      1. Se muestra el total a cobrar
      2. El cajero selecciona el método de pago
      3. Si es efectivo: ingresa el monto recibido → se calcula el vuelto
      4. Si es POS/Transferencia: ingresa el número de comprobante
      5. Presiona "CONFIRMAR" → se registra la venta y se imprime el ticket
  ============================================================ -->
  <div class="screen" id="scCobrar">
    <div class="screen-header">
      <button onclick="goTo('scSale')">← Volver</button>
      <h2>Cobrar</h2>
    </div>
    <div class="screen-body">

      <!-- Total a cobrar -->
      <div id="cobrTotal" style="font-size:36px;font-weight:700;text-align:center;padding:16px 0;">
        ₲0
      </div>

      <!-- Fila de descuento (solo visible si hay descuento) -->
      <div id="cobrDescRow" style="display:none;">
        <span>Descuento aplicado:</span>
        <span id="cobrDesc" style="color:var(--danger);"></span>
      </div>

      <!-- Botones de método de pago -->
      <div id="payMethods">
        <button id="payBtnEfectivo"     class="sel" onclick="selPay('Efectivo')">💵 Efectivo</button>
        <button id="payBtnPOS"                      onclick="selPay('POS')">💳 POS</button>
        <button id="payBtnTransferencia"            onclick="selPay('Transferencia')">📱 Transferencia</button>
      </div>

      <!-- Campo de comprobante (solo para POS y Transferencia) -->
      <div id="cobrCompRow" style="display:none;">
        <label>Nro. Comprobante / Referencia</label>
        <input id="cobrComp" type="text" placeholder="Ej: 123456" />
      </div>

      <!-- Monto recibido (para efectivo) -->
      <div id="cobrRecibidoRow">
        <label>Monto recibido</label>
        <!-- Al tocar este campo se abre el teclado numérico -->
        <div id="cobrRecibido" onclick="openNpEfectivo()">₲0</div>
      </div>

      <!-- Vuelto calculado automáticamente -->
      <div id="vueltoRow">
        <span>Vuelto:</span>
        <span id="cobrVuelto" style="font-weight:700;">—</span>
      </div>

      <!-- Botón de confirmar cobro -->
      <button id="btnConfirmarCobro" onclick="confirmarPago()">
        ✓ CONFIRMAR COBRO
      </button>

      <!-- Botón de pago dividido -->
      <button onclick="goDividir()">
        ÷ Pago dividido
      </button>

    </div>
  </div>

  <!-- ============================================================
    PANTALLA: PAGO DIVIDIDO
    ID: scDividir
    Permite cobrar una venta con varios métodos de pago.
    Ej: ₲50.000 en efectivo + ₲30.000 en POS.
  ============================================================ -->
  <div class="screen" id="scDividir">
    <div class="screen-header">
      <button onclick="goTo('scCobrar')">← Volver</button>
      <h2>Pago dividido</h2>
    </div>
    <div class="screen-body">

      <!-- Controles para agregar/quitar pagos -->
      <div id="divCountRow">
        <button id="divMinus" onclick="divChgCount(-1)" disabled>−</button>
        <span>Dividir en <strong id="divCount">2</strong> pagos</span>
        <button id="divPlus"  onclick="divChgCount(+1)">+</button>
      </div>

      <!-- Lista de pagos (se genera con renderDivList()) -->
      <div id="divList"></div>

      <!-- Monto restante por cobrar -->
      <div id="divRestante" style="text-align:center;font-size:18px;font-weight:700;padding:16px 0;"></div>

      <!-- Botón de confirmar todos los pagos -->
      <button onclick="dividirHecho(confirmarPago)">
        ✓ HECHO
      </button>

    </div>
  </div>

  <!-- ============================================================
    PANTALLA: CONFIGURACIÓN
    ID: scConfig
    Menú principal de configuración del negocio.
  ============================================================ -->
  <div class="screen" id="scConfig">
    <div class="screen-header">
      <button onclick="goTo('scSale')">← Volver</button>
      <h2>Configuración</h2>
    </div>
    <div class="screen-body">

      <!-- Información del negocio (se carga con renderConfigInfo()) -->
      <div id="cfgTimbradoDisplay" style="color:var(--muted);font-size:13px;"></div>

      <!-- Menú de opciones de configuración -->
      <div class="config-menu">
        <button onclick="goTo('scConfigGeneral')">
          🏪 Datos del negocio
        </button>
        <button onclick="goTo('scDescuentos')">
          🏷️ Descuentos
        </button>
        <button onclick="goTo('scArticulosList')">
          📦 Artículos
        </button>
        <!-- Más opciones de configuración... -->
      </div>

    </div>
  </div>

  <!-- ============================================================
    PANTALLA: CONFIGURACIÓN GENERAL
    ID: scConfigGeneral
    Formulario para editar los datos del negocio.
  ============================================================ -->
  <div class="screen" id="scConfigGeneral">
    <div class="screen-header">
      <button onclick="goTo('scConfig')">← Volver</button>
      <h2>Datos del negocio</h2>
    </div>
    <div class="screen-body">

      <label>Nombre del negocio *</label>
      <input id="cfgNombre" type="text" placeholder="Ej: Almacén Don José" />

      <label>RUC</label>
      <input id="cfgRuc" type="text" placeholder="Ej: 12345678-9" />

      <label>Dirección</label>
      <input id="cfgDireccion" type="text" placeholder="Ej: Av. Mariscal López 1234" />

      <label>Teléfono</label>
      <input id="cfgTelefono" type="tel" placeholder="Ej: 021 123456" />

      <label>Email</label>
      <input id="cfgEmail" type="email" placeholder="Ej: negocio@gmail.com" />

      <button onclick="guardarConfigGeneral()">
        ✓ GUARDAR CAMBIOS
      </button>

    </div>
  </div>

  <!-- ============================================================
    PANTALLA: LISTA DE ARTÍCULOS
    ID: scArticulosList
    Muestra todos los productos del catálogo con opción de editar/borrar.
    Se llena con renderArtList() de articulos.js.
  ============================================================ -->
  <div class="screen" id="scArticulosList">
    <div class="screen-header">
      <button onclick="goTo('scConfig')">← Volver</button>
      <h2>Artículos</h2>
      <!-- Botón para crear artículo nuevo -->
      <button onclick="abrirNuevoArticulo()">+ Nuevo</button>
    </div>
    <!-- Lista generada dinámicamente -->
    <div id="artList"></div>
  </div>

  <!-- ============================================================
    PANTALLA: FORMULARIO DE ARTÍCULO
    ID: scArticuloForm
    Para crear o editar un artículo del catálogo.
  ============================================================ -->
  <div class="screen" id="scArticuloForm">
    <div class="screen-header">
      <button onclick="goTo('scArticulosList')">← Volver</button>
      <!-- El título cambia entre "Nuevo artículo" y "Editar artículo" -->
      <h2 id="artFormTitulo">Nuevo artículo</h2>
    </div>
    <div class="screen-body">

      <!-- Campo oculto que guarda el ID del artículo que se está editando.
           Si está vacío, es un artículo nuevo. -->
      <input id="artIdEditar" type="hidden" value="" />

      <label>Nombre *</label>
      <input id="artFormNombre" type="text" placeholder="Ej: Coca Cola 600ml" />

      <!-- Checkbox: el cajero ingresa el precio al vender -->
      <label>
        <input id="artFormPrecioVariable" type="checkbox" />
        Precio variable (el cajero ingresa el precio)
      </label>

      <label>Precio (₲)</label>
      <input id="artFormPrecio" type="number" placeholder="Ej: 5000" />

      <label>Categoría</label>
      <input id="artFormCat" type="text" placeholder="Ej: Bebidas" list="catSuggestions" />
      <!-- Sugerencias de categorías existentes -->
      <datalist id="catSuggestions"></datalist>

      <label>IVA</label>
      <select id="artFormIva">
        <option value="10">10%</option>
        <option value="5">5%</option>
        <option value="0">Exento</option>
      </select>

      <label>Código de barras (opcional)</label>
      <input id="artFormCodigo" type="text" placeholder="Ej: 7890001234567" />

      <button onclick="guardarArticulo()">
        ✓ GUARDAR ARTÍCULO
      </button>

    </div>
  </div>

  <!-- ============================================================
    SCRIPTS
    Importamos todos los módulos JavaScript aquí, al final del body.
    El orden importa: los módulos que otros dependen de él van primero.

    type="module" permite usar import/export entre archivos JS,
    que es lo que hace que la app NO sea monolítica.
  ============================================================ -->

  <!-- Service Worker: permite que la app funcione sin internet (PWA) -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>

  <!-- Módulo principal: importa todo y arranca la app -->
  <script type="module">
    // ── IMPORTACIONES ─────────────────────────────────────────────
    // Importamos las funciones de cada módulo que vamos a usar.
    // Estas funciones reemplazan las 297 funciones que antes
    // estaban todas juntas en un solo <script> enorme.

    import { gs, toast, goTo, loadTheme, animAddToCart } from './js/ui.js';
    import { leerPendientesLocal } from './js/db.js';
    import {
      cart, pendientes, ticketCounter, tipoPedido,
      addCart, chgQty, calcTotal, calcSubtotal, calcDescuentoMonto,
      vaciarTicket, setTipoPedido, agregarMontoDelivery, quitarItemDelivery,
      onBtnGuardar, goGuardar, doGuardar, goPendientes, renderPendientes,
      cargarTicket, nuevaVenta, updBtnGuardar, updTabTicketHeader,
      goDividir, divChgCount, renderDivList, updDivRestante,
      divRemove, divCobrar, dividirHecho, openDivMethodSheet,
      pickDivMethod, openDivNumpad, openDivNPComp,
    } from './js/ventas.js';
    import {
      inicializarCatalogo, getProds, getProductColor,
      renderP, filterP, renderCatPills, renderCategoriasVenta,
      toggleSearch, onSearch, renderArtList,
      abrirNuevoArticulo, abrirEditarArticulo, guardarArticulo,
      borrarArticuloConConfirm,
    } from './js/articulos.js';
    import { goCobrar, selPay, npKey, aplicarBillete, confirmarPago } from './js/cobro.js';
    import {
      sincronizarConfigNegocio, renderConfigInfo, renderGeneralInfo,
      loadGeneralConfigInputs, guardarConfigGeneral, cargarTimbradoSesion,
      presupuestosHabilitados, doOpenShift, supaInsertTurno, getTurnoActivo,
    } from './js/config.js';

    // ── ESTADO LOCAL DE INDEX.HTML ────────────────────────────────
    // Variables que solo usa esta pantalla (no se exportan a otros módulos)

    let curCat = 'Todos los artículos'; // Categoría seleccionada actualmente
    let mesaActual = null;              // Mesa seleccionada (si aplica)
    let negocioId = null;               // ID del negocio activo
    let supabase = null;                // Cliente de Supabase (se inicializa al login)

    // ── INICIALIZACIÓN ────────────────────────────────────────────
    // Se ejecuta una sola vez cuando carga la página.

    async function init() {
      // 1. Cargamos el tema guardado por el usuario
      loadTheme();

      // 2. TODO: verificar si hay sesión activa, si no → ir a scLogin
      // Por ahora forzamos el negocioId para pruebas
      negocioId = localStorage.getItem('pos_negocio_id');
      if (!negocioId) {
        goTo('scLogin');
        return;
      }

      // 3. Cargamos el catálogo de productos y la configuración
      await Promise.all([
        inicializarCatalogo(negocioId),
        sincronizarConfigNegocio(negocioId),
      ]);

      // 4. Renderizamos la pantalla inicial
      renderCatPills(curCat, pickCat);
      renderP(curCat, onTileClick);
      updBtnGuardar();
      updTabTicketHeader(mesaActual);

      // 5. Vamos a la pantalla principal
      goTo('scSale');
    }

    // ── FUNCIONES LOCALES ──────────────────────────────────────────
    // Funciones que "pegan" los módulos entre sí.
    // Reciben eventos del HTML y llaman a las funciones de los módulos.

    /**
     * Se llama cuando el cajero toca un producto en la grilla.
     * Delega en addCart() de ventas.js.
     */
    function onTileClick(id, tileEl) {
      addCart(
        id, tileEl, getProds(),
        animAddToCart, getProductColor,
        addCartConPrecioVariable,  // función local de abajo
        updUI, updBtnGuardar, renderTkt
      );
    }

    /**
     * Abre el teclado numérico para ingresar el precio de un artículo variable.
     * @param {string} id - ID del artículo
     */
    function addCartConPrecioVariable(id) {
      // TODO: implementar apertura del numpad con contexto 'artPrecio'
      toast('Ingresá el precio del artículo');
    }

    /**
     * Cambia la categoría seleccionada y actualiza la grilla.
     * @param {string} nombre - Nombre de la categoría a mostrar
     */
    function pickCat(nombre) {
      curCat = nombre;
      renderCatPills(curCat, pickCat); // Actualiza las pastillas (activa la seleccionada)
      renderP(curCat, onTileClick);     // Actualiza la grilla de productos
      document.getElementById('catOv')?.classList.remove('open'); // Cierra el bottom sheet
    }

    /**
     * Actualiza toda la interfaz del carrito.
     * Se llama después de cualquier cambio en el carrito.
     */
    function updUI() {
      renderTkt();
      // Actualizamos los totales en el panel lateral
      document.getElementById('tabSubtotal').textContent = gs(calcSubtotal());
      document.getElementById('tabTotal').textContent = gs(calcTotal());

      // Mostramos/ocultamos la fila de descuento
      const desc = calcDescuentoMonto();
      const descRow = document.getElementById('tabDescRow');
      if (descRow) descRow.style.display = desc > 0 ? 'flex' : 'none';
      const descEl = document.getElementById('tabDesc');
      if (descEl) descEl.textContent = '−' + gs(desc);

      updTabTicketHeader(mesaActual);
    }

    /**
     * Dibuja los ítems del carrito en el panel lateral.
     */
    function renderTkt() {
      const tkt = document.getElementById('tabTkt');
      if (!tkt) return;
      if (!cart.length) {
        tkt.innerHTML = `<div class="tkt-empty">El carrito está vacío</div>`;
        return;
      }
      tkt.innerHTML = cart.map(item => `
        <div class="tkt-item">
          <div class="tkt-item-name">${item.name}</div>
          ${item.obs ? `<div class="tkt-item-obs">${item.obs}</div>` : ''}
          <div class="tkt-item-row">
            <button onclick="chgQty(${item.lineId}, -1, updUI, updBtnGuardar, renderTkt)">−</button>
            <span>${item.qty}</span>
            <button onclick="chgQty(${item.lineId}, +1, updUI, updBtnGuardar, renderTkt)">+</button>
            <span class="tkt-item-price">${gs(item.price * item.qty)}</span>
          </div>
        </div>
      `).join('');
    }

    // ── EXPONER FUNCIONES AL HTML ──────────────────────────────────
    // Los onclick en el HTML necesitan que las funciones estén en window.
    // Con módulos (type="module"), las funciones NO son globales por defecto,
    // así que tenemos que exponerlas explícitamente.

    // Funciones de UI global
    window.goTo = goTo;
    window.toast = toast;
    window.gs = gs;

    // Funciones de navegación y ventas
    window.updUI = updUI;
    window.renderTkt = renderTkt;
    window.updBtnGuardar = updBtnGuardar;
    window.setTipoPedido = (t) => { setTipoPedido(t); };
    window.agregarMontoDelivery = () => agregarMontoDelivery(updUI, updBtnGuardar);
    window.vaciarTicket = () => vaciarTicket(updUI, updBtnGuardar);
    window.onBtnGuardar = () => onBtnGuardar(mesaActual, guardarConMesa, goGuardar, () => goPendientes(renderPendientes));
    window.goGuardar = goGuardar;
    window.doGuardar = () => doGuardar(updUI, updBtnGuardar);
    window.renderPendientes = renderPendientes;
    window.cargarTicket = (i) => cargarTicket(i, updUI, updBtnGuardar);
    window.nuevaVenta = () => nuevaVenta(updUI, updBtnGuardar, null);

    // Funciones de cobro
    window.goCobrar = goCobrar;
    window.selPay = selPay;
    window.npKey = npKey;
    window.confirmarPago = () => confirmarPago(supabase, negocioId, getTurnoActivo()?.id, updUI, null);

    // Funciones de pago dividido
    window.goDividir = goDividir;
    window.divChgCount = divChgCount;
    window.renderDivList = renderDivList;
    window.divRemove = divRemove;
    window.divCobrar = divCobrar;
    window.dividirHecho = dividirHecho;
    window.openDivMethodSheet = openDivMethodSheet;
    window.pickDivMethod = pickDivMethod;
    window.openDivNumpad = openDivNumpad;
    window.openDivNPComp = openDivNPComp;

    // Funciones de catálogo
    window.toggleSearch = toggleSearch;
    window.onSearch = (q) => onSearch(q, curCat, onTileClick);
    window.renderArtList = renderArtList;
    window.abrirNuevoArticulo = abrirNuevoArticulo;
    window.abrirEditarArticulo = abrirEditarArticulo;
    window.guardarArticulo = guardarArticulo;

    // Funciones de config
    window.renderConfigInfo = renderConfigInfo;
    window.renderGeneralInfo = renderGeneralInfo;
    window.guardarConfigGeneral = guardarConfigGeneral;
    window.doOpenShift = doOpenShift;
    window.supaInsertTurno = () => supaInsertTurno(supabase, 'usuario_actual');

    // Función de mesa (placeholder para futura funcionalidad)
    function guardarConMesa() { toast('Función de mesas próximamente'); }
    window.guardarConMesa = guardarConMesa;

    // ── ARRANCAR ──────────────────────────────────────────────────
    init();
  </script>

</body>
</html>
